services:
  - type: web
    name: gong-mcp-gateway
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm run start:http
    healthCheckPath: /healthz
    envVars:
      - key: BASE_URL            # public URL of this service, e.g. https://gong-mcp-gateway.onrender.com
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
      - key: SESSION_SIGNING_KEY
        generateValue: true
      - key: GONG_ALLOWED_EMAILS # comma-separated allowlist of users who can sign in
        sync: false
      - key: GONG_ADMIN_EMAILS   # comma-separated subset with org-wide access (others are members)
        sync: false
      - key: GONG_ALLOWED_DOMAIN
        value: gonimbly.com
      - key: GONG_ACCESS_KEY     # org credential — lives only here, never on user machines
        sync: false
      - key: GONG_ACCESS_KEY_SECRET
        sync: false
      - key: GONG_BASE_URL       # org-specific API endpoint, shown in Gong → Settings → API
        value: https://us-32447.api.gong.io
