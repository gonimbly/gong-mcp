services:
  - type: web
    name: gong-mcp-gateway
    runtime: node
    plan: starter
    branch: main
    # Deploys are triggered by GitHub Actions (after tests pass) via the
    # service's deploy hook — see .github/workflows/ci.yml
    autoDeploy: false
    buildCommand: npm ci && npm run build
    startCommand: npm run start:http
    healthCheckPath: /healthz
    # Persistent disk for OAuth Dynamic Client Registration state. Without it, client
    # registrations live only in memory and are wiped on every restart — which breaks
    # Claude's silent token refresh and forces users to manually reconnect (~daily).
    # A Render disk attaches to a single instance, so keep this service at one instance.
    disk:
      name: gong-mcp-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: BASE_URL            # public URL of this service, e.g. https://gong-mcp-gateway.onrender.com
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
      - key: SESSION_SIGNING_KEY
        generateValue: true
      - key: GONG_CLIENT_STORE_PATH   # OAuth client registrations persist here, on the disk above
        value: /var/data/clients.json
      # GONG_ALLOWED_EMAILS is optional — when unset, any verified account on
      # GONG_ALLOWED_DOMAIN can sign in (member access). Set it only to restrict
      # sign-in to specific people, e.g. during a pilot.
      - key: GONG_ADMIN_EMAILS   # comma-separated admins with org-wide access (others are members)
        sync: false
      - key: GONG_ALLOWED_DOMAIN
        value: gonimbly.com
      - key: GONG_ACCESS_KEY     # org credential — lives only here, never on user machines
        sync: false
      - key: GONG_ACCESS_KEY_SECRET
        sync: false
      - key: GONG_BASE_URL       # org-specific API endpoint, shown in Gong → Settings → API
        value: https://us-32447.api.gong.io
      # Access-model dial — managed in the dashboard, not pinned here, so a
      # blueprint sync never reverts it. profiles (default when unset/empty);
      # set binary explicitly to roll back to the Phase 2 admin/member model.
      # See docs/remote-gateway.md "Rollout status & rollback".
      - key: GONG_POLICY_MODE
        sync: false
