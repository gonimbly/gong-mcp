services:
  - type: web
    name: gong-mcp-gateway
    runtime: node
    plan: starter
    branch: main
    # Deploys are triggered by GitHub Actions (after tests pass) via the
    # service's deploy hook — see .github/workflows/ci.yml
    autoDeploy: false
    buildCommand: npm ci && npm run build
    startCommand: npm run start:http
    healthCheckPath: /healthz
    envVars:
      - key: BASE_URL            # public URL of this service, e.g. https://gong-mcp-gateway.onrender.com
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
      - key: SESSION_SIGNING_KEY
        generateValue: true
      # GONG_ALLOWED_EMAILS is optional — when unset, any verified account on
      # GONG_ALLOWED_DOMAIN can sign in (member access). Set it only to restrict
      # sign-in to specific people, e.g. during a pilot.
      - key: GONG_ADMIN_EMAILS   # comma-separated admins with org-wide access (others are members)
        sync: false
      - key: GONG_ALLOWED_DOMAIN
        value: gonimbly.com
      - key: GONG_ACCESS_KEY     # org credential — lives only here, never on user machines
        sync: false
      - key: GONG_ACCESS_KEY_SECRET
        sync: false
      - key: GONG_BASE_URL       # org-specific API endpoint, shown in Gong → Settings → API
        value: https://us-32447.api.gong.io
      # Phase 3 rollout dial — managed in the dashboard, not pinned here, so a
      # blueprint sync never reverts the rollout state. binary (default when
      # unset/empty) → shadow (soak) → profiles. See docs/remote-gateway.md
      # "Rollout runbook".
      - key: GONG_POLICY_MODE
        sync: false
